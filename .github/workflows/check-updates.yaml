name: Check for component updates

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday 9am UTC
  workflow_dispatch:       # Allow manual trigger

permissions:
  issues: write

jobs:
  check-updates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check latest versions
        id: versions
        run: |
          # Current versions from manifest
          OTEL_CURRENT=$(grep -m1 'opentelemetry-collector-contrib' manifest.yaml | grep -oP 'v[\d.]+')
          BP_CURRENT=$(grep -m1 'bindplane-otel-collector' manifest.yaml | grep -oP 'v[\d.]+')

          # Latest releases
          OTEL_LATEST=$(gh release view --repo open-telemetry/opentelemetry-collector-contrib --json tagName -q .tagName)
          BP_LATEST=$(gh release view --repo observiq/bindplane-otel-collector --json tagName -q .tagName)

          echo "otel_current=$OTEL_CURRENT" >> "$GITHUB_OUTPUT"
          echo "otel_latest=$OTEL_LATEST" >> "$GITHUB_OUTPUT"
          echo "bp_current=$BP_CURRENT" >> "$GITHUB_OUTPUT"
          echo "bp_latest=$BP_LATEST" >> "$GITHUB_OUTPUT"

          echo "## Version Check" >> "$GITHUB_STEP_SUMMARY"
          echo "| Component | Current | Latest |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| OTel Contrib | $OTEL_CURRENT | $OTEL_LATEST |" >> "$GITHUB_STEP_SUMMARY"
          echo "| BindPlane | $BP_CURRENT | $BP_LATEST |" >> "$GITHUB_STEP_SUMMARY"

          # Set flag if any update is available
          if [ "$OTEL_CURRENT" != "$OTEL_LATEST" ] || [ "$BP_CURRENT" != "$BP_LATEST" ]; then
            echo "updates_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "updates_available=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create or update issue
        if: steps.versions.outputs.updates_available == 'true'
        run: |
          TITLE="Component updates available"
          BODY=$(cat <<'ISSUE_EOF'
          ## Component Updates Available

          | Component | Current | Latest | Changelog |
          |---|---|---|---|
          | OTel Contrib | OTEL_CURRENT | OTEL_LATEST | [Release notes](https://github.com/open-telemetry/opentelemetry-collector-contrib/releases/tag/OTEL_LATEST) |
          | BindPlane | BP_CURRENT | BP_LATEST | [Release notes](https://github.com/observiq/bindplane-otel-collector/releases/tag/BP_LATEST) |

          ### Steps to update
          1. Review the changelogs for breaking changes
          2. Update versions in `manifest.yaml`
          3. Build locally to verify: `builder --config manifest.yaml`
          4. Push a new tag to trigger release

          > Auto-generated by check-updates workflow
          ISSUE_EOF
          )

          # Replace placeholders
          BODY="${BODY//OTEL_CURRENT/${{ steps.versions.outputs.otel_current }}}"
          BODY="${BODY//OTEL_LATEST/${{ steps.versions.outputs.otel_latest }}}"
          BODY="${BODY//BP_CURRENT/${{ steps.versions.outputs.bp_current }}}"
          BODY="${BODY//BP_LATEST/${{ steps.versions.outputs.bp_latest }}}"

          # Ensure the label exists
          gh label create "dependencies" --description "Dependency updates" --color "0075ca" 2>/dev/null || true

          # Close any existing update issue to avoid duplicates
          EXISTING=$(gh issue list --search "Component updates available" --state open --json number -q '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            gh issue close "$EXISTING" --comment "Superseded by new check."
          fi

          gh issue create --title "$TITLE" --body "$BODY" --label "dependencies"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

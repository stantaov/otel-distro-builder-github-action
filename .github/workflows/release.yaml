name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: false

      - name: Install ocb
        run: go install go.opentelemetry.io/collector/cmd/builder@v0.146.0

      - name: Build collector
        run: builder --config manifest.yaml

      - name: Rename binary with version tag
        run: |
          VERSION=${GITHUB_REF_NAME}
          mv ./_build/otel-custom-agent ./_build/otel-custom-agent-${VERSION}-linux-amd64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./_build/otel-custom-agent-*
          generate_release_notes: true
